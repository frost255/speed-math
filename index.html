<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Speed Math Game</title>

<style>
body { font-family: Arial; text-align: center; margin-top: 40px; font-size: 26px; }

.hidden { display: none; }

button {
  padding: 14px 20px;
  margin: 6px;
  font-size: 24px;
  cursor: pointer;
}

input {
  padding: 14px;
  width: 420px;
  font-size: 26px;
  text-align: center;
}

.numbers { font-size: 34px; margin: 25px; }

.symbols { margin-top: 15px; }

.numberPad { margin-top: 20px; }

#backBtn{
position:absolute;
top:20px;
right:20px;
}
@media (max-width:600px){

body{
font-size:20px;
margin-top:20px;
}

button{
font-size:22px;
padding:16px 18px;
}

input{
width:90%;
font-size:24px;
}

.numbers{
font-size:28px;
}

.symbols button,
.numberPad button{
width:60px;
height:60px;
}

}
</style>
</head>


<body>

<h1>⚡ Speed Math Game</h1>

<div id="menu">
  <h2>Select Mode</h2>
  <button onclick="startNormal()">Normal Mode</button>
  <button onclick="startAdvanced()">Advanced Mode</button>
</div>

<div id="game" class="hidden">

<button id="backBtn" onclick="goBack()">⬅ Back</button>

<div class="numbers">
Numbers: <span id="nums"></span>
</div>

<div class="numbers">
Target: <span id="target"></span>
</div>

<p>
Time left: <span id="time">60</span>s
</p>

<p>
Score: <span id="score">0</span>
</p>

<input id="answer" readonly>

<br>

<div class="symbols" id="symbols"></div>

<div class="numberPad" id="numberPad"></div>

<br>
<button onclick="submitAnswer()">Submit</button>

<p id="result"></p>

</div>

<script>

let numbers=[]
let target=0
let timeLeft=60
let timer

let finalDiff=null
let playerValue=null
let answered=false
let mode="normal"

let score=0


function startNormal(){
mode="normal"
startGame(4,10,99)
}

function startAdvanced(){
mode="advanced"
startGame(5,100,999)
}

function startGame(count,minTarget,maxTarget){

document.getElementById("menu").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

numbers=[]

for(let i=0;i<count;i++){
numbers.push(Math.floor(Math.random()*9)+1)
}

target=Math.floor(Math.random()*(maxTarget-minTarget+1))+minTarget

document.getElementById("nums").textContent=numbers.join(", ")
document.getElementById("target").textContent=target

document.getElementById("answer").value=""
document.getElementById("answer").disabled=false
document.getElementById("result").textContent=""

setupSymbols()
setupNumbers()

timeLeft=(mode==="advanced")?90:60

answered=false
finalDiff=null
playerValue=null

document.getElementById("time").textContent=timeLeft
document.getElementById("score").textContent=score

clearInterval(timer)

timer=setInterval(()=>{

timeLeft--

document.getElementById("time").textContent=timeLeft

if(timeLeft<=0){
clearInterval(timer)
endGame()
}

},1000)

}

function setupSymbols(){

let symbolsDiv=document.getElementById("symbols")
symbolsDiv.innerHTML=""

let baseSymbols=["+","-","*","/","^","(",")"]

baseSymbols.forEach(sym=>{
symbolsDiv.innerHTML+=`<button onclick="addSymbol('${sym}')">${sym}</button>`
})

if(mode==="advanced"){

symbolsDiv.innerHTML+=`<button onclick="addSymbol('!')">!</button>`
symbolsDiv.innerHTML+=`<button onclick="addSymbol('√')">√</button>`

}

}

function setupNumbers(){

let pad=document.getElementById("numberPad")
pad.innerHTML=""

for(let i=1;i<=9;i++){
pad.innerHTML+=`<button onclick="addSymbol('${i}')">${i}</button>`
}

pad.innerHTML+=`<button onclick="deleteOne()">⌫</button>`

}

function addSymbol(symbol){
document.getElementById("answer").value+=symbol
}

function deleteOne(){
let box=document.getElementById("answer")
box.value=box.value.slice(0,-1)
}

function factorial(n){

if(n<0||n>6) throw "Invalid"

let r=1
for(let i=2;i<=n;i++) r*=i

return r
}

function validateNumbers(input){

let used=input.match(/\d+/g)

if(!used) return false

let temp=[...numbers]

for(let num of used){

let index=temp.indexOf(parseInt(num))

if(index===-1) return false

temp.splice(index,1)

}

return temp.length===0

}

function submitAnswer(){

if(answered) return

let input=document.getElementById("answer").value

if(!validateNumbers(input)){

document.getElementById("result").textContent=
"❌ Use each number exactly once!"

return
}

if(mode==="advanced"){

if((input.match(/!/g)||[]).length>1 ||
(input.match(/√/g)||[]).length>1){

document.getElementById("result").textContent=
"❌ Only one ! and one √ allowed!"

return

}

input=input.replace(/√(\d+)/g,"Math.sqrt($1)")
input=input.replace(/(\d+)!/g,"factorial($1)")

}

try{

input=input.replace(/\^/g,"**")

let value=eval(input)

playerValue=value

finalDiff=Math.abs(target-value)

answered=true

clearInterval(timer)

endGame()

}catch{

document.getElementById("result").textContent="Invalid expression!"

}

}

function endGame(){

let text=""

if(finalDiff===null){

text="⏰ Time's up!"

}else{

let roundScore=Math.max(0,100-finalDiff)

if(finalDiff===0){
roundScore+=50
text="🎯 PERFECT!"
}

score=roundScore

text+="<br>Your answer: "+playerValue
text+="<br>Target: "+target
text+="<br>Difference: "+finalDiff
text+="<br>Score: "+roundScore

}

document.getElementById("score").textContent=score

document.getElementById("result").innerHTML=
text+
"<br><br><button onclick='playAgain()'>🔁 Play Again</button>"

}

function playAgain(){

if(mode==="advanced"){
startAdvanced()
}else{
startNormal()
}

}

function goBack(){

if(confirm("Return to lobby? Your score will reset.")){

clearInterval(timer)

score=0

document.getElementById("game").classList.add("hidden")
document.getElementById("menu").classList.remove("hidden")

}

}

</script>

</body>
</html>
